# =============================================================
#  DSANext — Base Application Configuration
#  Profile-specific overrides in application-dev.yml / application-prod.yml
# =============================================================

spring:
  application:
    name: dsanext-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ── Jackson ──────────────────────────────────────────────
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
    time-zone: UTC

  # ── JPA / Hibernate ──────────────────────────────────────
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  # ── Flyway ───────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false

  # ── File Upload ──────────────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB

# ── Server ─────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

# ── DSANext Custom Properties ──────────────────────────────
dsanext:
  jwt:
    secret: ${JWT_SECRET:dsanext-super-secret-key-change-in-production-must-be-at-least-256-bits}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}       # 24 hours
    refresh-expiration-ms: ${JWT_REFRESH_MS:2592000000} # 30 days

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

  upload:
    profile-image-dir: ${UPLOAD_DIR:./uploads/profiles}
    allowed-types: image/jpeg,image/png,image/webp
    max-size-bytes: 5242880  # 5MB

# ── Actuator ───────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: DSANext
    version: 1.0.0
    description: DSA Practice Platform API

# ── Logging ────────────────────────────────────────────────
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.dsanext: INFO
