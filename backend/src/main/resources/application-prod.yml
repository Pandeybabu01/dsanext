# =============================================================
#  DSANext — Production Profile
#  Active when: SPRING_PROFILES_ACTIVE=prod
#  All sensitive values MUST come from environment variables.
# =============================================================

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=require
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: DSANextProdPool
      maximum-pool-size: 30
      minimum-idle: 5
      idle-timeout: 600000
      connection-timeout: 30000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

logging:
  level:
    root: WARN
    com.dsanext: INFO
  file:
    name: /var/log/dsanext/application.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30

server:
  ssl:
    enabled: false   # Terminate SSL at reverse proxy (Nginx)

management:
  endpoints:
    web:
      exposure:
        include: health,info
